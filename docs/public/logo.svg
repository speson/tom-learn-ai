<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#1a1a2e" stroke="#6366f1" stroke-width="2.5"/>

  <!-- Neural network nodes and connections -->
  <!-- Input layer -->
  <circle cx="30" cy="38" r="5" fill="#818cf8" opacity="0.9"/>
  <circle cx="30" cy="60" r="5" fill="#818cf8" opacity="0.9"/>
  <circle cx="30" cy="82" r="5" fill="#818cf8" opacity="0.9"/>

  <!-- Hidden layer -->
  <circle cx="60" cy="32" r="5.5" fill="#a78bfa" opacity="0.95"/>
  <circle cx="60" cy="52" r="5.5" fill="#a78bfa" opacity="0.95"/>
  <circle cx="60" cy="72" r="5.5" fill="#a78bfa" opacity="0.95"/>
  <circle cx="60" cy="92" r="5.5" fill="#a78bfa" opacity="0.95"/>

  <!-- Output layer -->
  <circle cx="90" cy="45" r="6" fill="#c084fc"/>
  <circle cx="90" cy="75" r="6" fill="#c084fc"/>

  <!-- Connections: input to hidden -->
  <line x1="35" y1="38" x2="55" y2="32" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="38" x2="55" y2="52" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="38" x2="55" y2="72" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="35" y1="60" x2="55" y2="32" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="35" y1="60" x2="55" y2="52" stroke="#818cf8" stroke-width="1.2" opacity="0.5"/>
  <line x1="35" y1="60" x2="55" y2="72" stroke="#818cf8" stroke-width="1.2" opacity="0.5"/>
  <line x1="35" y1="60" x2="55" y2="92" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="35" y1="82" x2="55" y2="52" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="35" y1="82" x2="55" y2="72" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="82" x2="55" y2="92" stroke="#818cf8" stroke-width="1" opacity="0.4"/>

  <!-- Connections: hidden to output -->
  <line x1="65" y1="32" x2="84" y2="45" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
  <line x1="65" y1="32" x2="84" y2="75" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <line x1="65" y1="52" x2="84" y2="45" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
  <line x1="65" y1="52" x2="84" y2="75" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="72" x2="84" y2="45" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="72" x2="84" y2="75" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
  <line x1="65" y1="92" x2="84" y2="75" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>

  <!-- Glow effect on output nodes -->
  <circle cx="90" cy="45" r="10" fill="#c084fc" opacity="0.15"/>
  <circle cx="90" cy="75" r="10" fill="#c084fc" opacity="0.15"/>

  <!-- Small sparkle/pulse dots for "learning" effect -->
  <circle cx="47" cy="45" r="1.5" fill="#e0e7ff" opacity="0.8"/>
  <circle cx="75" cy="58" r="1.5" fill="#e0e7ff" opacity="0.7"/>
  <circle cx="47" cy="77" r="1.5" fill="#e0e7ff" opacity="0.6"/>
</svg>
